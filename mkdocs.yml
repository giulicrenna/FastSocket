site_name: FastSocket Docs
site_description: Official documentation for FastSocket — TCP/UDP, secure, chunks, file transfer, examples and API reference.
site_url: https://giulicrenna.github.io/FastSocket/
repo_url: https://github.com/giulicrenna/FastSocket
repo_name: giulicrenna/FastSocket

theme:
  name: material
  language: en
  favicon: https://raw.githubusercontent.com/giulicrenna/FastSocket/main/assets/20240219_232307_logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            heading_level: 2

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Guide:
      - TCP: guide/tcp.md
      - UDP: guide/udp.md
      - Secure (RSA): guide/secure.md
      - Chunks: guide/chunks.md
      - File Transfer: guide/file-transfer.md
      - Hybrid TLS (RSA + AES + HMAC): guide/hybrid.md
      - Error Handling: guide/errors.md
  - Examples:
      - Overview: examples/overview.md
      - Echo: examples/echo.md
      - Chat: examples/chat.md
      - Secure Chat: examples/secure-chat.md
      - Chunks: examples/chunks.md
      - File Transfer: examples/file-transfer.md
      - UDP: examples/udp.md
      - Metrics: examples/metrics.md
      - Benchmarks: examples/benchmarks.md
      - Stress Test: examples/stress-test.md
  - API Reference:
      - Overview: api/index.md
      - FastSocket (legacy): api/legacy.md
      - Core: api/core.md
      - Server: api/server.md
      - Client: api/client.md
      - Security: api/security.md
      - Utils: api/utils.md
  - Roadmap: roadmap.md
  - Contributing: contributing.md
  - Changelog: changelog.md
