site_name: FastSocket Docs
site_description: Documentación oficial de FastSocket (TCP/UDP, secure, chunks, file transfer, ejemplos y API).
site_url: https://giulicrenna.github.io/FastSocket/
repo_url: https://github.com/giulicrenna/FastSocket
repo_name: giulicrenna/FastSocket

theme:
  name: material
  language: es
  favicon: https://raw.githubusercontent.com/giulicrenna/FastSocket/main/assets/20240219_232307_logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Cambiar a modo claro

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_root_heading: true
            show_source: false
            heading_level: 2

nav:
  - Inicio: index.md
  - Getting Started:
      - Instalación: getting-started/installation.md
      - Quickstart: getting-started/quickstart.md
  - Guía:
      - TCP: guide/tcp.md
      - UDP: guide/udp.md
      - Secure (RSA): guide/secure.md
      - Chunks: guide/chunks.md
      - File Transfer: guide/file-transfer.md
      - Modo Hybrid (RSA + AES + HMAC): guide/hybrid.md
      - Manejo de errores: guide/errors.md
  - Ejemplos:
      - Resumen: examples/overview.md
      - Echo: examples/echo.md
      - Chat: examples/chat.md
      - Secure Chat: examples/secure-chat.md
      - Chunks: examples/chunks.md
      - File Transfer: examples/file-transfer.md
      - UDP: examples/udp.md
      - Metrics: examples/metrics.md
      - Benchmarks: examples/benchmarks.md
      - Stress Test: examples/stress-test.md
  - API Reference:
      - Introducción: api/index.md
      - FastSocket (legacy): api/legacy.md
      - Core: api/core.md
      - Server: api/server.md
      - Client: api/client.md
      - Security: api/security.md
      - Utils: api/utils.md
  - Roadmap: roadmap.md
  - Contribuir: contributing.md
  - Changelog: changelog.md